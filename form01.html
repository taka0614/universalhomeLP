
<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>注文住宅FC加盟募集 | ユニバーサルホーム</title>
        <meta name="description" content="ユニバーサルホームFC加盟法人募集。商品力・ブランド力・本部支援により、地域工務店・建設会社の注文住宅事業を支援します。資料請求・個別相談はこちら。">
        <meta property="og:locale" content="ja_JP">
        <meta property="og:title" content="ユニバーサルホームFC加盟法人募集 | 注文住宅事業の成長を支援">
        <meta property="og:description" content="単独経営から、補い合う経営へ。ユニバーサルホームのFCモデルで、地域に選ばれる注文住宅事業へ。">
        <meta property="og:type" content="website">
        <!--// 以下、本番アップ時に置換必須 //-->
        <meta property="og:url" content="https://www.universalhome-fcpartner.co.jp/">
        <meta property="og:image" content="https://www.universalhome-fcpartner.co.jp/img/ogp.jpg">
        <!--// 以上 //-->
        <meta property="og:site_name" content="ユニバーサルホーム FC加盟法人募集">
        <meta name="twitter:card" content="summary_large_image">
        <link rel="icon" href="/favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="./css/reset.min.css">
        <link rel="stylesheet" href="./css/style.css">
        <link rel="stylesheet" href="./css/contact.css">
        <link rel="stylesheet" href="./css/catalog.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;400;700;900&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;400;700&display=swap" rel="stylesheet">
    </head>

    <body>
        <section class="form">
            <!--// 以下、本番アップ時に置換必須 //-->
            <form action="" method="post">
            <!--// 以上 //-->
                <div class="form__body">
                    <h2 class="form__title">資料請求</h2>
                    <p class="form__description">必要事項をご入力ください<span class="required__fields">必須</span>は入力必須項目となります。</p>
                    <div class="formTable">
                        <table class="entryFormTable">
                            <tbody>
                                <tr>
                                    <th><span class="must">御社名</span></th>
                                    <td><input type="text" class="wMiddle" name="name" placeholder="株式会社ユニバーサルホーム" required></td>
                                </tr>
                                <tr>
                                    <th><span class="must">ご担当者</span></th>
                                    <td>
                                        <dl>
                                            <dt>氏名</dt>
                                            <dd><input type="text" class="wShort" name="name" id="name" placeholder="山田　太郎" required></dd>
                                            <dt>フリガナ</dt>
                                            <dd><input type="text" class="wShort" name="rubi" id="rubi" placeholder="ヤマダ　タロウ" required></dd>
                                        </dl>
                                    </td>
                                </tr>
                                <tr>
                                    <th><span class="must">住所</span></th>
                                    <td>
                                        <dl>
                                            <dt>郵便番号</dt>
                                            <dd><input type="text" class="wShort" name="zipcode" id="zipcode" placeholder="1234567" required></dd>
                                            <dt>都道府県・市区町村</dt>
                                            <dd><input type="text" class="wMiddle" name="pref" id="pref" placeholder="東京都中央区八丁堀" required></dd>
                                            <dt>番地・建物名</dt>
                                            <dd><input type="text" class="wMiddle" name="address" id="address" placeholder="二丁目7-1 八丁堀ビル" required></dd>
                                        </dl>
                                    </td>
                                </tr>
                                <tr>
                                    <th><span class="must">電話番号</span></th>
                                    <td><input type="text" class="wShort" name="tel" id="tel" placeholder="0312345678" required></td>
                                </tr>
                                <tr>
                                    <th><span class="must">メールアドレス</span></th>
                                    <td><input type="email" class="wLong imeDis" name="mail01" id="mail01" placeholder="tarou@example.com" required><p>携帯メールの場合は、設定により返信できない場合がありますのでご注意ください。</p></td>
                                </tr>
                                <tr>
                                    <th><span class="must">メールアドレス（確認用）</span></th>
                                    <td><input type="email" class="wLong imeDis" name="mail02" id="mail02" placeholder="tarou@example.com" required></td>
                                </tr>
                                <tr>
                                    <th><span class="optional">ご相談・ご質問等ご記入ください </span></th>
                                    <td><textarea name="message" id="message" rows="6" cols="50"></textarea></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="privacyCheck">
                        <p>ご入力いただいた情報は、当社の個人情報保護方針に従い、適正に管理いたします。下記の「プライバシーポリシー」を必ずご一読いただき、同意の上、ご請求ください。</p>
                        <p><a href="/privacy/" target="_blank">プライバシーポリシー</a></p>
                        <input type="submit" value="入力内容確認へ進む" id="btnSubmit" class="rollalpha">
                    </div>
            </form>
        </section>
    </body>
</html>
